<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOLO Org Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js" defer></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #00d4aa;
      --accent2: #7c6af7;
      --text: #e0e0f0;
      --muted: #6b6b8a;
      --warning: #f0a050;
      --error: #e05050;
      --manager: #00d4aa;
      --analyst: #7c6af7;
      --engineer: #f0a050;
      --system: #6b6b8a;
      --po: #e0e0f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    #status {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    #status.connected { color: var(--accent); }
    #status.error { color: var(--error); }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .system-msg {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      font-size: 12px;
      padding: 8px 0;
    }

    .system-msg.banner {
      background: rgba(0, 212, 170, 0.08);
      border: 1px solid rgba(0, 212, 170, 0.2);
      border-radius: 6px;
      padding: 12px;
      margin: 8px 0;
      font-style: normal;
      font-weight: 500;
      color: var(--accent);
    }

    .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 8px;
      max-width: 100%;
    }

    .bubble-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }

    .speaker {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .speaker.manager { color: var(--manager); }
    .speaker.analyst { color: var(--analyst); }
    .speaker.engineer { color: var(--engineer); }
    .speaker.po { color: var(--po); }
    .speaker.system { color: var(--system); }

    .timestamp {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .bubble-content {
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .bubble-content p { margin: 0.4em 0; }
    .bubble-content p:first-child { margin-top: 0; }
    .bubble-content p:last-child { margin-bottom: 0; }
    .bubble-content h1, .bubble-content h2, .bubble-content h3 {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--accent);
      margin: 0.6em 0 0.3em;
      font-size: 13px;
    }
    .bubble-content h1 { font-size: 15px; }
    .bubble-content h2 { font-size: 14px; }
    .bubble-content ul, .bubble-content ol {
      padding-left: 1.5em;
      margin: 0.3em 0;
    }
    .bubble-content code {
      background: rgba(124, 106, 247, 0.12);
      color: var(--accent);
      padding: 1px 4px;
      border-radius: 3px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }
    .bubble-content pre {
      background: #0d0d18;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px;
      overflow-x: auto;
      margin: 0.4em 0;
    }
    .bubble-content pre code {
      background: none;
      padding: 0;
    }
    .bubble-content strong { color: var(--text); }
    .bubble-content blockquote {
      border-left: 3px solid var(--accent2);
      padding-left: 12px;
      color: var(--muted);
      font-style: italic;
      margin: 0.4em 0;
    }
    .bubble-content table {
      border-collapse: collapse;
      margin: 0.4em 0;
      font-size: 12px;
    }
    .bubble-content th, .bubble-content td {
      border: 1px solid var(--border);
      padding: 4px 8px;
    }
    .bubble-content th {
      background: rgba(124, 106, 247, 0.08);
      font-weight: 600;
    }

    .bubble.manager { border-left: 3px solid var(--manager); }
    .bubble.analyst { border-left: 3px solid var(--analyst); }
    .bubble.engineer { border-left: 3px solid var(--engineer); }

    .cursor {
      display: inline;
      animation: blink 0.8s step-end infinite;
      color: var(--accent);
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    .cost-line {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      padding: 2px 16px 0;
    }

    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #footer-status {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    .controls button {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface);
      color: var(--text);
    }

    .controls button:hover {
      background: rgba(224, 224, 240, 0.08);
    }

    #btn-pause {
      border-color: var(--accent);
      color: var(--accent);
    }
    #btn-pause:hover { background: rgba(0, 212, 170, 0.1); }
    #btn-pause.paused {
      background: rgba(0, 212, 170, 0.15);
      color: var(--accent);
    }

    #btn-cancel {
      border-color: var(--error);
      color: var(--error);
    }
    #btn-cancel:hover { background: rgba(224, 80, 80, 0.1); }

    .controls button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <header>
    <h1>YOLO ORG LEARNING</h1>
    <span id="status">Connecting...</span>
  </header>

  <main id="chat"></main>

  <footer>
    <span id="footer-status"></span>
    <div class="controls">
      <button id="btn-pause" onclick="togglePause()">Pause</button>
      <button id="btn-cancel" onclick="cancelSession()">Cancel</button>
    </div>
  </footer>

  <script>
    /* --- State --- */
    let ws = null;
    let currentSpeaker = null;
    let currentBubble = null;
    let currentContent = null;
    let rawText = '';
    let isPaused = false;
    let sessionActive = false;
    let userScrolled = false;

    const chat = document.getElementById('chat');
    const statusEl = document.getElementById('status');
    const footerStatus = document.getElementById('footer-status');
    const btnPause = document.getElementById('btn-pause');
    const btnCancel = document.getElementById('btn-cancel');

    /* --- Markdown rendering --- */
    function renderMarkdown(text) {
      if (typeof marked !== 'undefined') {
        try { return marked.parse(text); } catch (e) { /* fallback */ }
      }
      return '<pre>' + escapeHtml(text) + '</pre>';
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    /* --- Speaker colors --- */
    const speakerColors = {
      manager: 'manager', analyst: 'analyst', engineer: 'engineer',
      po: 'po', system: 'system',
    };

    function speakerClass(name) {
      return speakerColors[name] || 'system';
    }

    /* --- Timestamp --- */
    function timestamp() {
      const now = new Date();
      return [now.getHours(), now.getMinutes(), now.getSeconds()]
        .map(n => String(n).padStart(2, '0')).join(':');
    }

    /* --- Auto-scroll --- */
    chat.addEventListener('scroll', () => {
      const atBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 40;
      userScrolled = !atBottom;
    });

    function scrollToBottom() {
      if (!userScrolled) {
        chat.scrollTop = chat.scrollHeight;
      }
    }

    /* --- UI helpers --- */
    function addSystemMessage(text, isBanner) {
      closeBubble();
      const div = document.createElement('div');
      div.className = 'system-msg' + (isBanner ? ' banner' : '');
      div.textContent = text;
      chat.appendChild(div);
      scrollToBottom();
    }

    function openBubble(speaker) {
      closeBubble();
      currentSpeaker = speaker;
      rawText = '';

      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + speakerClass(speaker);

      const header = document.createElement('div');
      header.className = 'bubble-header';

      const label = document.createElement('span');
      label.className = 'speaker ' + speakerClass(speaker);
      label.textContent = speaker.charAt(0).toUpperCase() + speaker.slice(1);

      const ts = document.createElement('span');
      ts.className = 'timestamp';
      ts.textContent = timestamp();

      header.appendChild(label);
      header.appendChild(ts);
      bubble.appendChild(header);

      const content = document.createElement('div');
      content.className = 'bubble-content';
      bubble.appendChild(content);

      chat.appendChild(bubble);
      currentBubble = bubble;
      currentContent = content;
    }

    function closeBubble() {
      if (currentContent && rawText) {
        /* Remove cursor, render final markdown */
        currentContent.innerHTML = renderMarkdown(rawText);
      }
      currentSpeaker = null;
      currentBubble = null;
      currentContent = null;
      rawText = '';
    }

    function appendToken(speaker, delta) {
      if (speaker !== currentSpeaker) {
        openBubble(speaker);
      }
      rawText += delta;
      /* Show raw text with cursor during streaming */
      currentContent.innerHTML = escapeHtml(rawText) + '<span class="cursor">▌</span>';
      scrollToBottom();
    }

    function addCostLine(text) {
      closeBubble();
      const div = document.createElement('div');
      div.className = 'cost-line';
      div.textContent = text;
      chat.appendChild(div);
    }

    function addCompleteBubble(speaker, text) {
      closeBubble();
      openBubble(speaker);
      rawText = text;
      closeBubble();
      scrollToBottom();
    }

    /* --- Session end --- */
    function endSession(label) {
      closeBubble();
      sessionActive = false;
      addSystemMessage(label || 'Session complete', true);
      btnPause.disabled = true;
      btnCancel.disabled = true;
      footerStatus.textContent = label || 'Session complete';
    }

    /* --- Controls --- */
    function togglePause() {
      if (!ws || !sessionActive) return;
      if (isPaused) {
        ws.send(JSON.stringify({ type: 'resume' }));
        btnPause.textContent = 'Pause';
        btnPause.classList.remove('paused');
        isPaused = false;
      } else {
        ws.send(JSON.stringify({ type: 'pause' }));
        btnPause.textContent = 'Resume';
        btnPause.classList.add('paused');
        isPaused = true;
      }
    }

    function cancelSession() {
      if (!ws || !sessionActive) return;
      if (!confirm('Cancel session? This cannot be undone.')) return;
      ws.send(JSON.stringify({ type: 'cancel' }));
    }

    /* --- Message dispatch --- */
    function handleMessage(data) {
      switch (data.type) {
        case 'system': {
          const content = data.content || '';
          const lower = content.toLowerCase();
          if (lower.includes('session') && lower.includes('started')) {
            sessionActive = true;
            btnPause.disabled = false;
            btnCancel.disabled = false;
            footerStatus.textContent = 'Session active';
          }
          if (lower.includes('session complete')) {
            endSession('Session complete');
            return;
          }
          if (lower.includes('session cancelled')) {
            endSession('Session cancelled');
            return;
          }
          if (lower.includes('session paused')) {
            footerStatus.textContent = 'Paused';
          }
          if (lower.includes('session resumed')) {
            footerStatus.textContent = 'Session active';
          }
          addSystemMessage(content, false);
          break;
        }
        case 'token':
          appendToken(data.speaker, data.content);
          break;
        case 'cost':
          addCostLine(data.content);
          break;
        case 'message':
          addCompleteBubble(data.speaker, data.content);
          break;
        default:
          break;
      }
    }

    /* --- WebSocket connection --- */
    function connect() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const wsUrl = 'ws://' + window.location.host;

      statusEl.textContent = 'Connecting...';
      statusEl.className = '';

      ws = new WebSocket(wsUrl);

      ws.onopen = function () {
        statusEl.textContent = 'Connected';
        statusEl.className = 'connected';
        footerStatus.textContent = 'Waiting for session to start...';
        btnPause.disabled = true;
        btnCancel.disabled = true;
        if (token) {
          ws.send(JSON.stringify({ type: 'auth', token: token }));
        }
      };

      ws.onmessage = function (event) {
        try {
          const data = JSON.parse(event.data);
          handleMessage(data);
        } catch (e) {
          /* ignore parse errors */
        }
      };

      ws.onclose = function (event) {
        ws = null;
        closeBubble();
        if (event.code === 1008) {
          statusEl.textContent = 'Authentication failed';
          statusEl.className = 'error';
          footerStatus.textContent = 'Auth failed — check token';
          return;
        }
        if (sessionActive) {
          statusEl.textContent = 'Disconnected';
          statusEl.className = 'error';
          footerStatus.textContent = 'Connection lost — reconnecting...';
        } else {
          statusEl.textContent = 'Disconnected';
          statusEl.className = '';
          footerStatus.textContent = 'Waiting for session...';
        }
        setTimeout(connect, 3000);
      };

      ws.onerror = function () {
        statusEl.textContent = 'Connection error';
        statusEl.className = 'error';
      };
    }

    /* --- Init --- */
    connect();
  </script>
</body>
</html>
