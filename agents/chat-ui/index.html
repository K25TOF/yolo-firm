<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>YOLO Org Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js" defer></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #00d4aa;
      --accent2: #7c6af7;
      --text: #e0e0f0;
      --muted: #6b6b8a;
      --warning: #f0a050;
      --error: #e05050;
      --manager: #00d4aa;
      --analyst: #7c6af7;
      --engineer: #f0a050;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--bg) !important;
      color-scheme: dark !important;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 5px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    #status {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    #status.connected { color: var(--accent); }
    #status.error { color: var(--error); }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      display: flex;
      flex-direction: column;
    }

    /* --- System messages: IRC join/part style --- */
    .sys {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      padding: 2px 16px;
      line-height: 1.4;
    }
    .sys.banner {
      color: var(--accent);
      font-weight: 500;
      font-size: 11px;
      padding: 6px 16px;
    }

    /* --- Turn block: left-border colored bar --- */
    .turn {
      border-left: 3px solid var(--muted);
      margin: 6px 0 0;
      padding: 0 12px 0 10px;
    }
    .turn.manager { border-left-color: var(--manager); }
    .turn.analyst { border-left-color: var(--analyst); }
    .turn.engineer { border-left-color: var(--engineer); }

    .turn-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding-bottom: 2px;
    }

    .speaker {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .speaker.manager { color: var(--manager); }
    .speaker.analyst { color: var(--analyst); }
    .speaker.engineer { color: var(--engineer); }

    .ts {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .turn-body {
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .turn-body p { margin: 0.3em 0; }
    .turn-body p:first-child { margin-top: 0; }
    .turn-body p:last-child { margin-bottom: 0; }
    .turn-body h1, .turn-body h2, .turn-body h3 {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--accent);
      margin: 0.5em 0 0.2em;
      font-size: 13px;
    }
    .turn-body h1 { font-size: 14px; }
    .turn-body h2 { font-size: 13px; color: var(--accent2); }
    .turn-body ul, .turn-body ol { padding-left: 1.4em; margin: 0.2em 0; }
    .turn-body li { margin: 0.1em 0; }
    .turn-body code {
      background: rgba(124, 106, 247, 0.12);
      color: var(--accent);
      padding: 1px 4px;
      border-radius: 3px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }
    .turn-body pre {
      background: #0d0d18;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px;
      overflow-x: auto;
      margin: 0.3em 0;
    }
    .turn-body pre code { background: none; padding: 0; }
    .turn-body strong { color: var(--text); }
    .turn-body em { color: var(--muted); }
    .turn-body blockquote {
      border-left: 2px solid var(--accent2);
      padding-left: 10px;
      color: var(--muted);
      font-style: italic;
      margin: 0.3em 0;
    }
    .turn-body table { border-collapse: collapse; margin: 0.3em 0; font-size: 12px; }
    .turn-body th, .turn-body td { border: 1px solid var(--border); padding: 3px 6px; }
    .turn-body th { background: rgba(124, 106, 247, 0.08); font-weight: 600; }

    .turn-cost {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      opacity: 0.7;
    }

    .cursor {
      display: inline;
      animation: blink 0.8s step-end infinite;
      color: var(--accent);
    }
    @keyframes blink { 50% { opacity: 0; } }

    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 5px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #footer-status {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .controls { display: flex; gap: 8px; }
    .controls button {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface);
      color: var(--text);
    }
    .controls button:hover { background: rgba(224, 224, 240, 0.08); }
    #btn-pause { border-color: var(--accent); color: var(--accent); }
    #btn-pause:hover { background: rgba(0, 212, 170, 0.1); }
    #btn-pause.paused { background: rgba(0, 212, 170, 0.15); }
    #btn-cancel { border-color: var(--error); color: var(--error); }
    #btn-cancel:hover { background: rgba(224, 80, 80, 0.1); }
    .controls button:disabled { opacity: 0.3; cursor: default; }

    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>YOLO ORG LEARNING</h1>
    <span id="status">Connecting...</span>
  </header>

  <main id="chat"></main>

  <footer>
    <span id="footer-status"></span>
    <div class="controls">
      <button id="btn-pause" onclick="togglePause()">Pause</button>
      <button id="btn-cancel" onclick="cancelSession()">Cancel</button>
    </div>
  </footer>

  <script>
    let ws = null;
    let currentSpeaker = null;
    let currentTurn = null;
    let currentBody = null;
    let rawText = '';
    let isPaused = false;
    let sessionActive = false;
    let userScrolled = false;

    const chat = document.getElementById('chat');
    const statusEl = document.getElementById('status');
    const footerStatus = document.getElementById('footer-status');
    const btnPause = document.getElementById('btn-pause');
    const btnCancel = document.getElementById('btn-cancel');

    function renderMarkdown(text) {
      if (typeof marked !== 'undefined') {
        try { return marked.parse(text); } catch (e) { /* fallback */ }
      }
      return '<pre>' + escapeHtml(text) + '</pre>';
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function timestamp() {
      const now = new Date();
      return [now.getHours(), now.getMinutes(), now.getSeconds()]
        .map(n => String(n).padStart(2, '0')).join(':');
    }

    chat.addEventListener('scroll', () => {
      const atBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 40;
      userScrolled = !atBottom;
    });

    function scrollToBottom() {
      if (!userScrolled) chat.scrollTop = chat.scrollHeight;
    }

    function addSys(text, isBanner) {
      closeTurn();
      const div = document.createElement('div');
      div.className = 'sys' + (isBanner ? ' banner' : '');
      div.textContent = text;
      chat.appendChild(div);
      scrollToBottom();
    }

    function openTurn(speaker) {
      closeTurn();
      currentSpeaker = speaker;
      rawText = '';

      const turn = document.createElement('div');
      turn.className = 'turn ' + speaker;

      const hdr = document.createElement('div');
      hdr.className = 'turn-header';

      const label = document.createElement('span');
      label.className = 'speaker ' + speaker;
      label.textContent = speaker.charAt(0).toUpperCase() + speaker.slice(1);

      const ts = document.createElement('span');
      ts.className = 'ts';
      ts.textContent = timestamp();

      hdr.appendChild(label);
      hdr.appendChild(ts);
      turn.appendChild(hdr);

      const body = document.createElement('div');
      body.className = 'turn-body';
      turn.appendChild(body);

      chat.appendChild(turn);
      currentTurn = turn;
      currentBody = body;
    }

    function closeTurn() {
      if (currentBody && rawText) {
        currentBody.innerHTML = renderMarkdown(rawText);
      }
      currentSpeaker = null;
      currentTurn = null;
      currentBody = null;
      rawText = '';
    }

    function appendToken(speaker, delta) {
      if (speaker !== currentSpeaker) openTurn(speaker);
      rawText += delta;
      currentBody.innerHTML = escapeHtml(rawText) + '<span class="cursor">▌</span>';
      scrollToBottom();
    }

    function addCost(text) {
      closeTurn();
      const turns = chat.querySelectorAll('.turn');
      const lastTurn = turns[turns.length - 1];
      if (lastTurn) {
        const cost = document.createElement('div');
        cost.className = 'turn-cost';
        cost.textContent = text;
        lastTurn.appendChild(cost);
      }
    }

    function addCompleteTurn(speaker, text) {
      closeTurn();
      openTurn(speaker);
      rawText = text;
      closeTurn();
      scrollToBottom();
    }

    function endSession(label) {
      closeTurn();
      sessionActive = false;
      addSys(label || 'Session complete', true);
      btnPause.disabled = true;
      btnCancel.disabled = true;
      footerStatus.textContent = label || 'Session complete';
    }

    function togglePause() {
      if (!ws || !sessionActive) return;
      if (isPaused) {
        ws.send(JSON.stringify({ type: 'resume' }));
        btnPause.textContent = 'Pause';
        btnPause.classList.remove('paused');
        isPaused = false;
      } else {
        ws.send(JSON.stringify({ type: 'pause' }));
        btnPause.textContent = 'Resume';
        btnPause.classList.add('paused');
        isPaused = true;
      }
    }

    function cancelSession() {
      if (!ws || !sessionActive) return;
      if (!confirm('Cancel session? This cannot be undone.')) return;
      ws.send(JSON.stringify({ type: 'cancel' }));
    }

    function handleMessage(data) {
      switch (data.type) {
        case 'system': {
          const content = data.content || '';
          const lower = content.toLowerCase();
          if (lower.includes('session') && lower.includes('started')) {
            sessionActive = true;
            btnPause.disabled = false;
            btnCancel.disabled = false;
            footerStatus.textContent = 'Session active';
          }
          if (lower.includes('session complete')) { endSession('Session complete'); return; }
          if (lower.includes('session cancelled')) { endSession('Session cancelled'); return; }
          if (lower.includes('session paused')) footerStatus.textContent = 'Paused';
          if (lower.includes('session resumed')) footerStatus.textContent = 'Session active';
          addSys(content, lower.includes('session') && lower.includes('started'));
          break;
        }
        case 'token':
          appendToken(data.speaker, data.content);
          break;
        case 'cost':
          addCost(data.content);
          break;
        case 'message':
          addCompleteTurn(data.speaker, data.content);
          break;
      }
    }

    function connect() {
      const wsUrl = 'ws://' + window.location.host;
      statusEl.textContent = 'Connecting...';
      statusEl.className = '';

      ws = new WebSocket(wsUrl);

      ws.onopen = function () {
        statusEl.textContent = 'Connected';
        statusEl.className = 'connected';
        footerStatus.textContent = 'Waiting for session...';
        btnPause.disabled = true;
        btnCancel.disabled = true;
      };

      ws.onmessage = function (event) {
        try { handleMessage(JSON.parse(event.data)); } catch (e) { /* ignore */ }
      };

      ws.onclose = function () {
        ws = null;
        closeTurn();
        if (sessionActive) {
          statusEl.textContent = 'Disconnected';
          statusEl.className = 'error';
          footerStatus.textContent = 'Connection lost — reconnecting...';
        } else {
          statusEl.textContent = 'Disconnected';
          statusEl.className = '';
          footerStatus.textContent = 'Waiting for session...';
        }
        setTimeout(connect, 3000);
      };

      ws.onerror = function () {
        statusEl.textContent = 'Connection error';
        statusEl.className = 'error';
      };
    }

    connect();
  </script>
</body>
</html>
