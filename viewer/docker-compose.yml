services:
  yolo-firm-viewer:
    build: .
    container_name: yolo-firm-viewer
    ports:
      - "8002:80"
    volumes:
      - ..:/data:ro
      - /home/claude/projects/yolo/analysis/kpis:/kpis:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
