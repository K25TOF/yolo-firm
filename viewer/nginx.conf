server {
    listen 80;
    server_name _;

    # Serve viewer HTML at root
    location = / {
        alias /data/viewer/;
        index index.html;
    }

    location = /index.html {
        root /data/viewer;
    }

    # Serve markdown files at /docs/<name>.md
    location /docs/ {
        alias /data/;
        types {
            text/plain md;
        }
        default_type text/plain;
        add_header Cache-Control "no-cache";
    }
}
